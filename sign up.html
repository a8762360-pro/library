<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign up</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            background: blue;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .sign-up{
            background: #fff;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            
        }
        .sign-up h1{
            text-align: center;
        }
        .sign-up input{
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid black;
            border-radius: 4px;
        }
        .sign-up button {
            width: 100%;
            padding: 10px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        form{
            
            justify-items: center;
        }

    </style>
</head>
<body>
    <div class="sign-up">
        <form action="">
            <h1>sign up</h1>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <input type="password" placeholder="Confirm Password" required>
            <button>sign up</button>
        </form>
        
    </div>
</body>
</html>
